# Ingress AWS de Torcal-ML (2026-07-05): solo dominios *.recommender.torcal.es.
# Los antiguos *.blueoption.net se retiraron (sin DNS, en desuso).
# Whitelist de IPs por inbound-cidrs (ALB compartido torcal-shared-lb).

# Ingress para API - api.recommender.torcal.es
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: torcal-es-api-ingress
  namespace: torcal-ml
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Whitelist de IPs (act. 2026-07-16): el ALB compartido solo admite estas IPs de origen.
    alb.ingress.kubernetes.io/inbound-cidrs: "92.172.131.110/32,80.31.134.132/32,54.75.129.105/32,52.211.215.120/32,88.12.19.107/32"
    alb.ingress.kubernetes.io/group.name: torcal-shared-lb
    alb.ingress.kubernetes.io/group.order: '60'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-west-1:651857781455:certificate/47d3c0ba-7c5e-4c86-a90b-99d073925c7b"

    # SSL Configuration
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-TLS-1-2-2017-01"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'

    # Performance & Security
    alb.ingress.kubernetes.io/load-balancer-attributes: |
      idle_timeout.timeout_seconds=600,
      routing.http2.enabled=true,
      access_logs.s3.enabled=false
spec:
  ingressClassName: alb
  rules:
  - host: api.recommender.torcal.es
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: torcal-ml-2
            port:
              number: 80

---

